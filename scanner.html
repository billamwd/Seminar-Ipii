<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Absensi Seminar HMJ IPII</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #eef2f7; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-top: 8px solid #0056b3; }
        h2 { color: #0056b3; margin-bottom: 5px; }
        p.sub { color: #666; margin-top: 0; font-size: 14px; }
        #reader { background: #f8f9fa; border-radius: 8px; overflow: hidden; border: 1px solid #ced4da !important; }
        #result { font-size: 18px; font-weight: bold; margin-top: 20px; padding: 12px; border-radius: 6px; background: #fff; border: 1px dashed #0056b3; color: #0056b3; }
        .sukses { background: #d4edda !important; color: #155724 !important; border: 1px solid #c3e6cb !important; }
        .proses { background: #fff3cd !important; color: #856404 !important; border: 1px solid #ffeeba !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scan QR Code Peserta</h2>
    <p class="sub">Seminar Nasional HMJ IPII</p>
    
    <div id="reader"></div>
    <div id="result">Menunggu panitia memindai QR Code...</div>
</div>

<script>
    const FORM_URL = "https://script.google.com/macros/s/AKfycby7DKATyw_LSIituSHtLLPzoe5hBzZ6R3DhTKguZ-b4PEYglv10oFJg0VuJNBByS-WbuQ/exec";
    let isProcessing = false;

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return;
        isProcessing = true;

        const resultDiv = document.getElementById('result');
        resultDiv.className = "proses";
        resultDiv.innerText = "Sedang memproses ID: " + decodedText + "... Mohon tunggu";
        
        const formData = new FormData();
        formData.append('idPeserta', decodedText);
        formData.append('action', 'checkin');

        fetch(FORM_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        })
        .then(res => {
            isProcessing = false;
            resultDiv.className = "sukses";
            resultDiv.innerText = "Proses Berhasil Mengirim: " + decodedText;
            alert("🎉 Selesai! Sinyal absensi ID " + decodedText + " telah dikirim ke Google Sheets.");
        })
        .catch(err => {
            isProcessing = false;
            resultDiv.className = "";
            resultDiv.innerText = "Terjadi kesalahan jaringan.";
            alert("⚠️ Gagal terkirim, silakan coba scan ulang.");
        });
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
